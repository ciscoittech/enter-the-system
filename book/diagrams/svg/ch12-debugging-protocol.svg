<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 320" width="100%" style="max-width: 1020px; display: block; background: transparent; font-family: 'Source Sans 3', 'Inter', sans-serif;"><defs><marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#2B4C6F"></path></marker><marker id="arrow-amber" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C8873D"></path></marker><marker id="arrow-red" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C45B4A"></path></marker><marker id="arrow-green" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#5A8F6A"></path></marker><marker id="dot" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="5" markerHeight="5"><circle cx="3" cy="3" r="2.5" fill="#2B4C6F"></circle></marker></defs><g><text x="20" y="14" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">FIGURE 12.2</text><text x="20" y="28" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="16" font-weight="600" fill="#2B4C6F">Five-step debugging protocol</text></g><g><g><rect x="30" y="130" width="170" height="80" rx="7" ry="7" class="dg-node"></rect><text x="115" y="168" text-anchor="middle" dominant-baseline="middle" class="dg-text">1. Symptom</text><text x="115" y="184" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">what went wrong</text></g><g><path d="M 200 170 Q 212 170 224 170" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g></g><g><g><rect x="224" y="130" width="170" height="80" rx="7" ry="7" class="dg-node"></rect><text x="309" y="168" text-anchor="middle" dominant-baseline="middle" class="dg-text">2. Map to component</text><text x="309" y="184" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">which one owns this</text></g><g><path d="M 394 170 Q 406 170 418 170" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g></g><g><g><rect x="418" y="130" width="170" height="80" rx="7" ry="7" class="dg-node dg-node--highlight"></rect><text x="503" y="168" text-anchor="middle" dominant-baseline="middle" class="dg-text">3. Isolate</text><text x="503" y="184" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">reproduce alone</text></g><g><path d="M 588 170 Q 600 170 612 170" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g></g><g><g><rect x="612" y="130" width="170" height="80" rx="7" ry="7" class="dg-node"></rect><text x="697" y="168" text-anchor="middle" dominant-baseline="middle" class="dg-text">4. Fix</text><text x="697" y="184" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">change one thing</text></g><g><path d="M 782 170 Q 794 170 806 170" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g></g><g><g><rect x="806" y="130" width="170" height="80" rx="7" ry="7" class="dg-node"></rect><text x="891" y="168" text-anchor="middle" dominant-baseline="middle" class="dg-text">5. Add check</text><text x="891" y="184" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">prevent recurring</text></g></g><text x="20" y="290" text-anchor="start" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#8B7D6B">Five steps. The middle one — isolate — is where most people skip and shouldn't.</text></svg>
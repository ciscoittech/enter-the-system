<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" width="100%" style="max-width: 780px; display: block; background: transparent; font-family: 'Source Sans 3', 'Inter', sans-serif;"><defs><marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#2B4C6F"></path></marker><marker id="arrow-amber" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C8873D"></path></marker><marker id="arrow-red" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C45B4A"></path></marker><marker id="arrow-green" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#5A8F6A"></path></marker><marker id="dot" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="5" markerHeight="5"><circle cx="3" cy="3" r="2.5" fill="#2B4C6F"></circle></marker></defs><g><text x="20" y="14" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">FIGURE 3.2</text><text x="20" y="28" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="16" font-weight="600" fill="#2B4C6F">Pattern 2 — the gate</text></g><g><rect x="40" y="120" width="150" height="56" rx="7" ry="7" class="dg-node"></rect><text x="115" y="153" text-anchor="middle" dominant-baseline="middle" class="dg-text">Work arrives</text></g><g><polygon points="360,100 450,148 360,196 270,148" class="dg-decision"></polygon><text x="360" y="144" text-anchor="middle" dominant-baseline="middle" class="dg-text">Quality check</text><text x="360" y="160" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">pass or rework?</text></g><g><rect x="580" y="120" width="170" height="56" rx="7" ry="7" class="dg-node dg-node--success"></rect><text x="665" y="153" text-anchor="middle" dominant-baseline="middle" class="dg-text">Move forward</text></g><g><rect x="285" y="280" width="190" height="56" rx="7" ry="7" class="dg-node dg-node--highlight"></rect><text x="380" y="313" text-anchor="middle" dominant-baseline="middle" class="dg-text">Rework with feedback</text></g><g><path d="M 190 148 Q 230 148 270 148" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g><g><path d="M 450 148 Q 515 148 580 148" class="dg-arrow" stroke="#5A8F6A" marker-end="url(#arrow-green)"></path><text x="515" y="138" text-anchor="middle" dominant-baseline="middle" class="dg-text--edge">pass</text></g><g><path d="M 360 196 Q 370 238 380 280" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path><text x="379.7280621468537" y="235.6837947269396" text-anchor="middle" dominant-baseline="middle" class="dg-text--edge">fail</text></g><g><path d="M 285 308 Q 236.7978254595676 194.60886115055686 115 176" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g><text x="20" y="376" text-anchor="start" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#8B7D6B">Nothing moves forward until it passes the check.</text></svg>
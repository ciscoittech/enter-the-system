ans 3', 'Inter', sans-serif" font-size="14" font-weight="600" fill="#2B4C6F">The four concepts persist · implementations change</text><text x="20" y="500" text-anchor="start" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#8B7D6B">Systems evolve three ways. The concepts stay; the components move.</text></svg>
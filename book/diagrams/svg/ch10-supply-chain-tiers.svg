MIUM</text></g><g><rect x="330" y="108" width="240" height="56" rx="7" ry="7" class="dg-node dg-node--success"></rect><text x="450" y="141" text-anchor="middle" dominant-baseline="middle" class="dg-text">Verified factory</text></g><g><rect x="590" y="108" width="240" height="56" rx="7" ry="7" class="dg-node dg-node--success"></rect><text x="710" y="141" text-anchor="middle" dominant-baseline="middle" class="dg-text">Certified organic</text></g><g><path d="M 230 200 Q 271.9141945536495 155.36592899007732 330 136" class="dg-arrow" stroke="#5A8F6A" marker-end="url(#arrow-green)"></path><text x="269.48845291974436" y="151.57570768710053" text-anchor="middle" dominant-baseline="middle" class="dg-text--edge">match</text></g><g><rect x="300" y="200" width="560" height="100" rx="8" ry="8" fill="none" stroke="#2B4C6F" stroke-width="0.75" stroke-dasharray="3 3"></rect><text x="310" y="194" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">TIER 2 · STANDARD</text></g><g><rect x="330" y="228" width="240" height="56" rx="7" ry="7" class="dg-node"></rect><text x="450" y="261" text-anchor="middle" dominant-baseline="middle" class="dg-text">Known distributor</text></g><g><rect x="590" y="228" width="240" height="56" rx="7" ry="7" class="dg-node"></rect><text x="710" y="261" text-anchor="middle" dominant-baseline="middle" class="dg-text">Consistent quality</text></g><g><path d="M 230 244 Q 280 250 330 256" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path><text x="281.1914522061843" y="240.07123161513078" text-anchor="middle" dominant-baseline="middle" class="dg-text--edge">default</text></g><g><rect x="300" y="320" width="560" height="100" rx="8" ry="8" fill="none" stroke="#2B4C6F" stroke-width="0.75" stroke-dasharray="3 3"></rect><text x="310" y="314" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">TIER 3 · RISK</text></g><g><rect x="330" y="348" width="240" height="56" rx="7" ry="7" class="dg-node dg-node--error"></rect><text x="450" y="381" text-anchor="middle" dominant-baseline="middle" class="dg-text">Unknown origin</text></g><g><rect x="590" y="348" width="240" height="56" rx="7" ry="7" class="dg-node dg-node--error"></rect><text x="710" y="381" text-anchor="middle" dominant-baseline="middle" class="dg-text">Price anomaly</text></g><g><path d="M 230 290 Q 270.2194109675793 344.37277794467525 330 376" class="dg-arrow" stroke="#C45B4A" marker-end="url(#arrow-red)"></path><text x="282.9341767097262" y="329.58816661659745" text-anchor="middle" dominant-baseline="middle" class="dg-text--edge">flag</text></g><text x="20" y="476" text-anchor="start" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#8B7D6B">Price percentiles and language signals sort suppliers into tiers automatically.</text></svg>
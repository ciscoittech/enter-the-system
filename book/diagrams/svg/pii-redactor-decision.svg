<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" width="100%" style="max-width: 900px; display: block; background: transparent; font-family: 'Source Sans 3', 'Inter', sans-serif;"><defs><marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#2B4C6F"></path></marker><marker id="arrow-amber" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C8873D"></path></marker><marker id="arrow-red" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C45B4A"></path></marker><marker id="arrow-green" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#5A8F6A"></path></marker><marker id="dot" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="5" markerHeight="5"><circle cx="3" cy="3" r="2.5" fill="#2B4C6F"></circle></marker></defs><g><text x="20" y="14" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">FIGURE A.2</text><text x="20" y="28" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="16" font-weight="600" fill="#2B4C6F">PII redactor — three-tier decision logic</text></g><g><polygon points="150,168 250,228 150,288 50,228" class="dg-decision"></polygon><text x="150" y="224" text-anchor="middle" dominant-baseline="middle" class="dg-text">Confidence</text><text x="150" y="240" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">score?</text></g><g><rect x="310" y="70" width="560" height="90" rx="8" ry="8" fill="none" stroke="#2B4C6F" stroke-width="0.75" stroke-dasharray="3 3"></rect><text x="320" y="64" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">HIGH CONFIDENCE · &gt;95%</text></g><g><rect x="350" y="92" width="490" height="48" rx="7" ry="7" class="dg-node dg-node--success"></rect><text x="595" y="114" text-anchor="middle" dominant-baseline="middle" class="dg-text">Auto-redact</text><text x="595" y="130" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">no review needed</text></g><g><path d="M 230 180 Q 282.94117647058823 134.76470588235293 350 116" class="dg-arrow" stroke="#5A8F6A" marker-end="url(#arrow-green)"></path><text x="280.8235294117647" y="130.7941176470588" text-anchor="middle" dominant-baseline="middle" class="dg-text--edge">&gt;95%</text></g><g><rect x="310" y="180" width="560" height="90" rx="8" ry="8" fill="none" stroke="#2B4C6F" stroke-width="0.75" stroke-dasharray="3 3"></rect><text x="320" y="174" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">MEDIUM CONFIDENCE · 70–95%</text></g><g><rect x="350" y="202" width="490" height="48" rx="7" ry="7" class="dg-node dg-node--highlight"></rect><text x="595" y="224" text-anchor="middle" dominant-baseline="middle" class="dg-text">Redact and flag</text><text x="595" y="240" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">queue for review</text></g><g><path d="M 250 228 Q 300 227 350 226" class="dg-arrow dg-arrow--accent" stroke="#C8873D" marker-end="url(#arrow-amber)"></path><text x="299.800039988004" y="217.00199940019994" text-anchor="middle" dominant-baseline="middle" class="dg-text--edge">70–95%</text></g><g><rect x="310" y="290" width="560" height="90" rx="8" ry="8" fill="none" stroke="#2B4C6F" stroke-width="0.75" stroke-dasharray="3 3"></rect><text x="320" y="284" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">LOW CONFIDENCE · &lt;70%</text></g><g><rect x="350" y="312" width="490" height="48" rx="7" ry="7" class="dg-node"></rect><text x="595" y="334" text-anchor="middle" dominant-baseline="middle" class="dg-text">Pass through and log</text><text x="595" y="350" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">audit trail only</text></g><g><path d="M 230 276 Q 283.2917960675006 319.41640786499875 350 336" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path><text x="292.01246117974983" y="301.9750776405004" text-anchor="middle" dominant-baseline="middle" class="dg-text--edge">&lt;70%</text></g><text x="20" y="436" text-anchor="start" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#8B7D6B">Confidence determines the action. Only high-confidence detections auto-redact.</text></svg>
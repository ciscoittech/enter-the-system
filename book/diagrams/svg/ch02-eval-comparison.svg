<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="100%" style="max-width: 760px; display: block; background: transparent; font-family: 'Source Sans 3', 'Inter', sans-serif;"><defs><marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#2B4C6F"></path></marker><marker id="arrow-amber" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C8873D"></path></marker><marker id="arrow-red" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C45B4A"></path></marker><marker id="arrow-green" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#5A8F6A"></path></marker><marker id="dot" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="5" markerHeight="5"><circle cx="3" cy="3" r="2.5" fill="#2B4C6F"></circle></marker></defs><g><text x="20" y="14" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">FIGURE 2.1</text><text x="20" y="28" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="16" font-weight="600" fill="#2B4C6F">Basic vs structured prompt</text></g><g><rect x="30" y="80" width="320" height="220" rx="8" ry="8" fill="none" stroke="#2B4C6F" stroke-width="0.75" stroke-dasharray="3 3"></rect><text x="40" y="74" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">BASIC PROMPT</text></g><g><rect x="70" y="120" width="240" height="56" rx="7" ry="7" class="dg-node"></rect><text x="190" y="153" text-anchor="middle" dominant-baseline="middle" class="dg-text">Help me study AWS</text></g><g><path d="M 190 176 Q 190 200 190 224" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g><g><rect x="70" y="224" width="240" height="56" rx="7" ry="7" class="dg-node dg-node--error"></rect><text x="190" y="250" text-anchor="middle" dominant-baseline="middle" class="dg-text">Generic quiz</text><text x="190" y="266" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">too broad to be useful</text></g><g><rect x="410" y="80" width="320" height="220" rx="8" ry="8" fill="none" stroke="#2B4C6F" stroke-width="0.75" stroke-dasharray="3 3"></rect><text x="420" y="74" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">STRUCTURED PROMPT</text></g><g><rect x="450" y="108" width="240" height="92" rx="7" ry="7" class="dg-node"></rect><text x="570" y="130" text-anchor="middle" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="13" font-weight="600" fill="#2B4C6F">Structured prompt</text><text x="570" y="152" text-anchor="middle" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#8B7D6B">Role</text><text x="570" y="166" text-anchor="middle" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#8B7D6B">Topic</text><text x="570" y="180" text-anchor="middle" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#8B7D6B">Format</text><text x="570" y="194" text-anchor="middle" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#8B7D6B">Constraints</text></g><g><path d="M 570 200 Q 570 212 570 224" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g><g><rect x="450" y="224" width="240" height="56" rx="7" ry="7" class="dg-node dg-node--success"></rect><text x="570" y="250" text-anchor="middle" dominant-baseline="middle" class="dg-text">Targeted quiz</text><text x="570" y="266" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">scoped, scenario-based</text></g><text x="20" y="336" text-anchor="start" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#8B7D6B">Same AI, same topic. Structure changes the output quality.</text></svg>
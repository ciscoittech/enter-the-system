<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 780" width="100%" style="max-width: 760px; display: block; background: transparent; font-family: 'Source Sans 3', 'Inter', sans-serif;"><defs><marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#2B4C6F"></path></marker><marker id="arrow-amber" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C8873D"></path></marker><marker id="arrow-red" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C45B4A"></path></marker><marker id="arrow-green" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#5A8F6A"></path></marker><marker id="dot" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="5" markerHeight="5"><circle cx="3" cy="3" r="2.5" fill="#2B4C6F"></circle></marker></defs><g><text x="20" y="14" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">FIGURE 14.2</text><text x="20" y="28" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="16" font-weight="600" fill="#2B4C6F">Eight-step design process</text></g><g><g><rect x="60" y="80" width="280" height="64" rx="7" ry="7" class="dg-node"></rect><text x="200" y="110" text-anchor="middle" dominant-baseline="middle" class="dg-text">1. Frustration</text><text x="200" y="126" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">something is broken</text></g><g><path d="M 200 144 Q 200 151 200 158" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g></g><g><g><rect x="60" y="158" width="280" height="64" rx="7" ry="7" class="dg-node"></rect><text x="200" y="188" text-anchor="middle" dominant-baseline="middle" class="dg-text">2. Identify the concept</text><text x="200" y="204" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">instr / mem / ctrl / flow</text></g><g><path d="M 200 222 Q 200 229 200 236" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g></g><g><g><rect x="60" y="236" width="280" height="64" rx="7" ry="7" class="dg-node"></rect><text x="200" y="266" text-anchor="middle" dominant-baseline="middle" class="dg-text">3. Choose the component</text><text x="200" y="282" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">which file fixes this</text></g><g><path d="M 200 300 Q 200 307 200 314" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g></g><g><g><rect x="60" y="314" width="280" height="64" rx="7" ry="7" class="dg-node"></rect><text x="200" y="344" text-anchor="middle" dominant-baseline="middle" class="dg-text">4. Write the file</text><text x="200" y="360" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">small, specific</text></g><g><path d="M 200 378 Q 200 385 200 392" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g></g><g><g><rect x="60" y="392" width="280" height="64" rx="7" ry="7" class="dg-node"></rect><text x="200" y="422" text-anchor="middle" dominant-baseline="middle" class="dg-text">5. Test it</text><text x="200" y="438" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">one case</text></g><g><path d="M 200 456 Q 200 463 200 470" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g></g><g><g><rect x="60" y="470" width="280" height="64" rx="7" ry="7" class="dg-node dg-node--highlight"></rect><text x="200" y="500" text-anchor="middle" dominant-baseline="middle" class="dg-text">6. Add more components</text><text x="200" y="516" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">as needed</text></g></g><g><path d="M 340 502 Q 420 424 340 346" class="dg-arrow dg-arrow--accent" stroke="#C8873D" marker-end="url(#arrow-amber)"></path><text x="368" y="424" text-anchor="middle" dominant-baseline="middle" class="dg-text--edge">loop</text></g><g><g><path d="M 200 534 Q 200 538 200 542" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g><g><polygon points="200,536 330,578 200,620 70,578" class="dg-decision"></polygon><text x="200" y="574" text-anchor="middle" dominant-baseline="middle" class="dg-text">7. Break it on purpose</text><text x="200" y="590" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">does it still work?</text></g></g><g><g><path d="M 200 620 Q 200 654 200 688" class="dg-arrow" stroke="#5A8F6A" marker-end="url(#arrow-green)"></path><text x="210" y="654" text-anchor="middle" dominant-baseline="middle" class="dg-text--edge">pass</text></g><g><rect x="60" y="688" width="280" height="64" rx="7" ry="7" class="dg-node"></rect><text x="200" y="718" text-anchor="middle" dominant-baseline="middle" class="dg-text">8. Document</text><text x="200" y="734" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">so future-you knows</text></g><g><path d="M 60 578 Q -20 462 60 346" class="dg-arrow" stroke="#C45B4A" marker-end="url(#arrow-red)"></path><text x="8" y="462" text-anchor="middle" dominant-baseline="middle" class="dg-text--edge">fail</text></g></g><text x="20" y="760" text-anchor="start" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#8B7D6B">The design process. Step 6 loops; step 7 gates. Both patterns you already know.</text></svg>
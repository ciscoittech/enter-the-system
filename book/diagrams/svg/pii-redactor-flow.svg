<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="100%" style="max-width: 900px; display: block; background: transparent; font-family: 'Source Sans 3', 'Inter', sans-serif;"><defs><marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#2B4C6F"></path></marker><marker id="arrow-amber" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C8873D"></path></marker><marker id="arrow-red" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C45B4A"></path></marker><marker id="arrow-green" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#5A8F6A"></path></marker><marker id="dot" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="5" markerHeight="5"><circle cx="3" cy="3" r="2.5" fill="#2B4C6F"></circle></marker></defs><g><text x="20" y="14" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">FIGURE A.1</text><text x="20" y="28" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="16" font-weight="600" fill="#2B4C6F">PII redactor — complete data flow</text></g><g><rect x="350" y="70" width="200" height="56" rx="7" ry="7" class="dg-node"></rect><text x="450" y="103" text-anchor="middle" dominant-baseline="middle" class="dg-text">Raw input</text></g><g><path d="M 450 126 Q 450 141 450 156" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g><g><rect x="80" y="156" width="740" height="150" rx="8" ry="8" fill="none" stroke="#2B4C6F" stroke-width="0.75" stroke-dasharray="3 3"></rect><text x="90" y="150" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">DETECTION STAGE</text></g><g><rect x="120" y="196" width="200" height="70" rx="7" ry="7" class="dg-node"></rect><text x="220" y="229" text-anchor="middle" dominant-baseline="middle" class="dg-text">Regex patterns</text><text x="220" y="245" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">emails, SSNs, phones</text></g><g><rect x="350" y="196" width="200" height="70" rx="7" ry="7" class="dg-node"></rect><text x="450" y="229" text-anchor="middle" dominant-baseline="middle" class="dg-text">Context analysis</text><text x="450" y="245" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">surrounding text</text></g><g><rect x="580" y="196" width="200" height="70" rx="7" ry="7" class="dg-node"></rect><text x="680" y="229" text-anchor="middle" dominant-baseline="middle" class="dg-text">Confidence scoring</text><text x="680" y="245" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">weighted ensemble</text></g><g><polygon points="450,326 560,376 450,426 340,376" class="dg-decision"></polygon><text x="450" y="372" text-anchor="middle" dominant-baseline="middle" class="dg-text">Redaction decision</text><text x="450" y="388" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">confidence threshold?</text></g><g><path d="M 220 266 Q 316.7001933530961 279.1557061944172 400 330" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g><g><path d="M 450 266 Q 450 296 450 326" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g><g><path d="M 680 266 Q 583.2998066469039 279.1557061944172 500 330" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g><g><rect x="120" y="470" width="220" height="56" rx="7" ry="7" class="dg-node dg-node--success"></rect><text x="230" y="503" text-anchor="middle" dominant-baseline="middle" class="dg-text">Clean output</text></g><g><rect x="580" y="470" width="220" height="56" rx="7" ry="7" class="dg-node dg-node--highlight"></rect><text x="690" y="503" text-anchor="middle" dominant-baseline="middle" class="dg-text">Manual review queue</text></g><g><path d="M 370 400 Q 308.94427190999915 452.8885438199983 230 470" class="dg-arrow" stroke="#5A8F6A" marker-end="url(#arrow-green)"></path><text x="308.94427190999915" y="452.8885438199983" text-anchor="middle" dominant-baseline="middle" class="dg-text--edge">pass</text></g><g><path d="M 530 400 Q 601.9836233196058 453.3231466980438 690 470" class="dg-arrow dg-arrow--accent" stroke="#C8873D" marker-end="url(#arrow-amber)"></path><text x="610" y="435" text-anchor="middle" dominant-baseline="middle" class="dg-text--edge">flag</text></g><text x="20" y="544" text-anchor="start" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#8B7D6B">Three detection methods run in parallel before the redaction decision.</text></svg>
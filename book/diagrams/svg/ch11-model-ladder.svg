<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" width="100%" style="max-width: 900px; display: block; background: transparent; font-family: 'Source Sans 3', 'Inter', sans-serif;"><defs><marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#2B4C6F"></path></marker><marker id="arrow-amber" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C8873D"></path></marker><marker id="arrow-red" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C45B4A"></path></marker><marker id="arrow-green" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#5A8F6A"></path></marker><marker id="dot" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="5" markerHeight="5"><circle cx="3" cy="3" r="2.5" fill="#2B4C6F"></circle></marker></defs><g><text x="20" y="14" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">FIGURE 11.2</text><text x="20" y="28" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="16" font-weight="600" fill="#2B4C6F">Model ladder</text></g><g><g><rect x="60" y="90" width="520" height="90" rx="7" ry="7" class="dg-node dg-node--highlight"></rect><text x="74" y="133" text-anchor="start" dominant-baseline="middle" class="dg-text">Reasoning tier</text><text x="74" y="149" text-anchor="start" dominant-baseline="middle" class="dg-text--sub">complex analysis, multi-step chains</text></g><text x="90" y="164" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-style="italic" fill="#8B7D6B">e.g. Evaluate supplier reliability</text><text x="620" y="141" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="600" fill="#2B4C6F">$$$$</text></g><g><g><rect x="60" y="198" width="520" height="90" rx="7" ry="7" class="dg-node"></rect><text x="74" y="241" text-anchor="start" dominant-baseline="middle" class="dg-text">Standard tier</text><text x="74" y="257" text-anchor="start" dominant-baseline="middle" class="dg-text--sub">most tasks</text></g><text x="90" y="272" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-style="italic" fill="#8B7D6B">e.g. Generate quiz questions</text><text x="620" y="249" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="600" fill="#2B4C6F">$$</text></g><g><g><rect x="60" y="306" width="520" height="90" rx="7" ry="7" class="dg-node"></rect><text x="74" y="349" text-anchor="start" dominant-baseline="middle" class="dg-text">Fast tier</text><text x="74" y="365" text-anchor="start" dominant-baseline="middle" class="dg-text--sub">simple, repetitive</text></g><text x="90" y="380" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-style="italic" fill="#8B7D6B">e.g. Format output, classify input</text><text x="620" y="357" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="600" fill="#2B4C6F">$</text></g><text x="20" y="436" text-anchor="start" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#8B7D6B">Match the model to the task. Not everything needs the expensive tier.</text></svg>
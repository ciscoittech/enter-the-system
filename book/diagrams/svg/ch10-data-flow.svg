<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" style="max-width: 900px; display: block; background: transparent; font-family: 'Source Sans 3', 'Inter', sans-serif;"><defs><marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#2B4C6F"></path></marker><marker id="arrow-amber" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C8873D"></path></marker><marker id="arrow-red" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#C45B4A"></path></marker><marker id="arrow-green" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#5A8F6A"></path></marker><marker id="dot" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="5" markerHeight="5"><circle cx="3" cy="3" r="2.5" fill="#2B4C6F"></circle></marker></defs><g><text x="20" y="14" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">FIGURE 10.1</text><text x="20" y="28" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="16" font-weight="600" fill="#2B4C6F">Data flow — raw sources to business decisions</text></g><g><rect x="60" y="70" width="780" height="120" rx="8" ry="8" fill="none" stroke="#2B4C6F" stroke-width="0.75" stroke-dasharray="3 3"></rect><text x="70" y="64" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#8B7D6B">RAW SOURCES</text></g><g><rect x="100" y="102" width="220" height="64" rx="7" ry="7" class="dg-node"></rect><text x="210" y="132" text-anchor="middle" dominant-baseline="middle" class="dg-text">Supplier websites</text><text x="210" y="148" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">catalogs, terms</text></g><g><rect x="340" y="102" width="220" height="64" rx="7" ry="7" class="dg-node"></rect><text x="450" y="132" text-anchor="middle" dominant-baseline="middle" class="dg-text">Trade databases</text><text x="450" y="148" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">import/export records</text></g><g><rect x="580" y="102" width="220" height="64" rx="7" ry="7" class="dg-node"></rect><text x="690" y="132" text-anchor="middle" dominant-baseline="middle" class="dg-text">Social signals</text><text x="690" y="148" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">reviews, complaints</text></g><g><rect x="100" y="250" width="700" height="88" rx="7" ry="7" class="dg-node dg-node--active"></rect><text x="450" y="292" text-anchor="middle" dominant-baseline="middle" class="dg-text dg-text--inverse">Six parallel analyses</text><text x="450" y="308" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub dg-text--inverse">pricing · quality · logistics · reputation · compliance · trend</text></g><g><path d="M 210 166 Q 261.8231825036001 200.6894473175713 300 250" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g><g><path d="M 450 166 Q 450 208 450 250" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g><g><path d="M 690 166 Q 638.1768174963998 200.6894473175713 600 250" class="dg-arrow" stroke="#2B4C6F" marker-end="url(#arrow)"></path></g><g><rect x="210" y="400" width="480" height="72" rx="7" ry="7" class="dg-node dg-node--highlight"></rect><text x="450" y="434" text-anchor="middle" dominant-baseline="middle" class="dg-text">Business decision</text><text x="450" y="450" text-anchor="middle" dominant-baseline="middle" class="dg-text--sub">what to buy, from whom, at what price</text></g><g><path d="M 450 338 Q 450 369 450 400" class="dg-arrow dg-arrow--accent" stroke="#C8873D" marker-end="url(#arrow-amber)"></path></g><text x="20" y="500" text-anchor="start" font-family="'Source Sans 3', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#8B7D6B">Six analyses run against every supplier. The decision is the output, not the data.</text></svg>
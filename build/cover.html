<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  @page {
    size: 7.5in 9.25in;
    margin: 0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 7.5in;
    height: 9.25in;
    background: #F7F3ED;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    padding: 1.1in 0.9in 0.7in 0.9in;
    position: relative;
    overflow: hidden;
  }

  /* Subtle top border accent */
  body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: #C8873D;
  }

  .title-block {
    margin-top: 0.2in;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 42pt;
    color: #2B4C6F;
    line-height: 1.1;
    letter-spacing: -0.5px;
    margin-bottom: 0.25in;
  }

  .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 13pt;
    color: #C8873D;
    line-height: 1.5;
    max-width: 4.5in;
  }

  .illustration {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.3in 0;
  }

  .illustration svg {
    width: 4.8in;
    height: auto;
  }

  .bottom-block {
    border-top: 1.5px solid #C8873D;
    padding-top: 0.2in;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .author {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 12pt;
    color: #2B4C6F;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .edition {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 9pt;
    color: #8B7D6B;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="title-block">
  <h1>From Prompts<br>to Pipelines</h1>
  <div class="subtitle">A Systems-Based Approach to<br>Prompt Engineering and Agentic Workflows</div>
</div>

<div class="illustration">
  <svg viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg">
    <!-- Blueprint-style systems diagram: 4 concepts in a flow -->
    <defs>
      <style>
        .node { fill: none; stroke: #2B4C6F; stroke-width: 1.8; }
        .node-fill { fill: #F7F3ED; }
        .arrow { fill: none; stroke: #2B4C6F; stroke-width: 1.4; }
        .arrow-head { fill: #2B4C6F; }
        .label { font-family: 'Inter', sans-serif; font-size: 11px; fill: #2B4C6F; text-anchor: middle; font-weight: 500; letter-spacing: 1px; }
        .sublabel { font-family: 'Inter', sans-serif; font-size: 8px; fill: #8B7D6B; text-anchor: middle; font-weight: 400; }
        .grid { stroke: #D4C9B8; stroke-width: 0.3; }
        .grid-major { stroke: #C4B9A8; stroke-width: 0.5; }
      </style>
    </defs>

    <!-- Subtle blueprint grid -->
    <g opacity="0.3">
      <line x1="0" y1="40" x2="480" y2="40" class="grid"/>
      <line x1="0" y1="80" x2="480" y2="80" class="grid"/>
      <line x1="0" y1="120" x2="480" y2="120" class="grid"/>
      <line x1="0" y1="160" x2="480" y2="160" class="grid-major"/>
      <line x1="0" y1="200" x2="480" y2="200" class="grid"/>
      <line x1="0" y1="240" x2="480" y2="240" class="grid"/>
      <line x1="0" y1="280" x2="480" y2="280" class="grid"/>
      <line x1="60" y1="0" x2="60" y2="320" class="grid"/>
      <line x1="120" y1="0" x2="120" y2="320" class="grid"/>
      <line x1="180" y1="0" x2="180" y2="320" class="grid"/>
      <line x1="240" y1="0" x2="240" y2="320" class="grid-major"/>
      <line x1="300" y1="0" x2="300" y2="320" class="grid"/>
      <line x1="360" y1="0" x2="360" y2="320" class="grid"/>
      <line x1="420" y1="0" x2="420" y2="320" class="grid"/>
    </g>

    <!-- INSTRUCTION node (top) -->
    <rect x="170" y="20" width="140" height="50" rx="8" class="node-fill"/>
    <rect x="170" y="20" width="140" height="50" rx="8" class="node"/>
    <text x="240" y="42" class="label">INSTRUCTION</text>
    <text x="240" y="56" class="sublabel">what you tell it</text>

    <!-- Arrow: Instruction -> Memory -->
    <path d="M 310 45 Q 370 45 370 100" class="arrow"/>
    <polygon points="366,98 370,108 374,98" class="arrow-head"/>

    <!-- MEMORY node (right) -->
    <rect x="300" y="110" width="140" height="50" rx="8" class="node-fill"/>
    <rect x="300" y="110" width="140" height="50" rx="8" class="node"/>
    <text x="370" y="132" class="label">MEMORY</text>
    <text x="370" y="146" class="sublabel">what persists</text>

    <!-- Arrow: Memory -> Control -->
    <path d="M 370 160 Q 370 215 310 215" class="arrow"/>
    <polygon points="312,211 302,215 312,219" class="arrow-head"/>

    <!-- CONTROL node (bottom) -->
    <rect x="170" y="190" width="140" height="50" rx="8" class="node-fill"/>
    <rect x="170" y="190" width="140" height="50" rx="8" class="node"/>
    <text x="240" y="212" class="label">CONTROL</text>
    <text x="240" y="226" class="sublabel">what catches mistakes</text>

    <!-- Arrow: Control -> Flow -->
    <path d="M 170 215 Q 110 215 110 160" class="arrow"/>
    <polygon points="106,162 110,152 114,162" class="arrow-head"/>

    <!-- FLOW node (left) -->
    <rect x="40" y="110" width="140" height="50" rx="8" class="node-fill"/>
    <rect x="40" y="110" width="140" height="50" rx="8" class="node"/>
    <text x="110" y="132" class="label">FLOW</text>
    <text x="110" y="146" class="sublabel">how stages connect</text>

    <!-- Arrow: Flow -> Instruction (completing the loop) -->
    <path d="M 110 110 Q 110 45 170 45" class="arrow"/>
    <polygon points="168,41 178,45 168,49" class="arrow-head"/>

    <!-- Center label -->
    <text x="240" y="275" font-family="'Inter', sans-serif" font-size="9" fill="#8B7D6B" text-anchor="middle" font-weight="300" letter-spacing="3">THE SYSTEM</text>

    <!-- Subtle corner marks (blueprint registration) -->
    <line x1="10" y1="10" x2="25" y2="10" stroke="#C4B9A8" stroke-width="0.8"/>
    <line x1="10" y1="10" x2="10" y2="25" stroke="#C4B9A8" stroke-width="0.8"/>
    <line x1="470" y1="10" x2="455" y2="10" stroke="#C4B9A8" stroke-width="0.8"/>
    <line x1="470" y1="10" x2="470" y2="25" stroke="#C4B9A8" stroke-width="0.8"/>
    <line x1="10" y1="310" x2="25" y2="310" stroke="#C4B9A8" stroke-width="0.8"/>
    <line x1="10" y1="310" x2="10" y2="295" stroke="#C4B9A8" stroke-width="0.8"/>
    <line x1="470" y1="310" x2="455" y2="310" stroke="#C4B9A8" stroke-width="0.8"/>
    <line x1="470" y1="310" x2="470" y2="295" stroke="#C4B9A8" stroke-width="0.8"/>
  </svg>
</div>

<div class="bottom-block">
  <span class="author">Terrence Hunt</span>
  <span class="edition">First Edition</span>
</div>

</body>
</html>

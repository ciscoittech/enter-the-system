---
title: "From Prompts to Pipelines"
subtitle: "A Systems-Based Approach to Prompt Engineering and Agentic Workflows"
author: "Terrence Hunt"
date: "2026"
lang: en-US

# Eisvogel book mode
book: true
titlepage: false

# Typography
mainfont: "Source Serif 4"
sansfont: "Source Sans 3"
monofont: "Source Code Pro"
fontsize: 11pt
linestretch: 1.3

# Page layout (7.5 x 9.25 trim for technical books)
geometry:
  - paperwidth=7.5in
  - paperheight=9.25in
  - inner=1.25in
  - outer=1in
  - top=0.85in
  - bottom=1in
  - twoside

# Disable Eisvogel headers/footers (per-file builds make them wrong)
disable-header-and-footer: true

header-includes:
  - \widowpenalty=10000
  - \clubpenalty=10000

# Code blocks
listings: false
code-block-font-size: "\\small"

# No TOC per file (we'll generate one in Typst)
toc: false

# Chapters start on right-hand pages
top-level-division: chapter

# Widow/orphan control
classoption:
  - openright

# Links
colorlinks: true
linkcolor: "darkgray"
urlcolor: "teal"

# PDF metadata
subject: "AI Systems, Prompt Engineering, Agentic Workflows"
keywords: ["AI", "prompt engineering", "systems thinking", "Claude", "agentic workflows"]
...
